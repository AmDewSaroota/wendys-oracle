<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GeoThai — แผนที่ธรณีวิทยาไทย</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Marker Cluster -->
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<!-- Thai Font -->
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0f0f1a;
  --bg2: #161625;
  --bg3: #1e1e32;
  --sidebar-w: 320px;
  --topbar-h: 48px;
  --accent: #4fc3f7;
  --accent2: #ff7043;
  --text: #e0e0e0;
  --text2: #90a4ae;
  --text3: #546e7a;
  --border: rgba(255,255,255,0.08);
  --radius: 10px;
}
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Prompt', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
}

/* ===== TOP BAR ===== */
.topbar {
  height: var(--topbar-h);
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  z-index: 1000;
  flex-shrink: 0;
}
.topbar-logo {
  display: flex; align-items: center; gap: 8px;
  font-weight: 600; font-size: 1rem; color: var(--accent);
  white-space: nowrap;
}
.topbar-logo svg { width: 24px; height: 24px; fill: var(--accent); }
.topbar-spacer { flex: 1; }
.topbar-btn {
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  color: var(--text2);
  font-family: 'Prompt', sans-serif;
  font-size: 0.75rem;
  font-weight: 500;
  padding: 5px 12px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.topbar-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); }
.topbar-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
.menu-btn {
  display: none;
  background: none; border: none; color: var(--text2); cursor: pointer;
  padding: 4px; line-height: 0;
}
.menu-btn svg { width: 22px; height: 22px; fill: currentColor; }

/* ===== MAIN LAYOUT ===== */
.main {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: var(--sidebar-w);
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
  z-index: 900;
}
.sidebar-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
}
.sidebar-scroll::-webkit-scrollbar { width: 4px; }
.sidebar-scroll::-webkit-scrollbar-track { background: transparent; }
.sidebar-scroll::-webkit-scrollbar-thumb { background: var(--text3); border-radius: 2px; }

/* Search */
.search-wrap {
  position: relative;
  margin-bottom: 12px;
}
.search-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 9px 12px 9px 36px;
  color: var(--text);
  font-family: 'Prompt', sans-serif;
  font-size: 0.8rem;
  outline: none;
  transition: border-color 0.2s;
}
.search-input::placeholder { color: var(--text3); }
.search-input:focus { border-color: var(--accent); }
.search-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  width: 16px; height: 16px; fill: var(--text3); pointer-events: none;
}
.search-results {
  position: absolute; top: 100%; left: 0; right: 0;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 0 0 8px 8px; max-height: 240px; overflow-y: auto;
  z-index: 50; display: none;
}
.search-results.show { display: block; }
.search-item {
  padding: 8px 12px;
  font-size: 0.78rem;
  cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}
.search-item:hover { background: rgba(255,255,255,0.05); }
.search-item:last-child { border-bottom: none; }
.search-item-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.search-item-text { flex: 1; min-width: 0; }
.search-item-name { color: var(--text); }
.search-item-sub { color: var(--text3); font-size: 0.7rem; }

/* Layer Groups */
.layer-group {
  margin-bottom: 8px;
  background: var(--bg);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  overflow: hidden;
}
.layer-group-header {
  display: flex;
  align-items: center;
  padding: 10px 12px;
  cursor: pointer;
  gap: 8px;
  user-select: none;
  transition: background 0.15s;
}
.layer-group-header:hover { background: rgba(255,255,255,0.03); }
.layer-group-toggle {
  width: 18px; height: 18px; border-radius: 4px;
  border: 2px solid var(--text3);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.15s;
  cursor: pointer;
}
.layer-group-toggle.on { border-color: var(--accent); background: var(--accent); }
.layer-group-toggle.on::after {
  content: ''; width: 5px; height: 9px;
  border: solid #000; border-width: 0 2px 2px 0;
  transform: rotate(45deg) translate(-1px, -1px);
}
.layer-group-icon { font-size: 1rem; flex-shrink: 0; }
.layer-group-name { flex: 1; font-size: 0.82rem; font-weight: 500; }
.layer-group-count {
  background: rgba(255,255,255,0.08);
  padding: 1px 7px; border-radius: 10px;
  font-size: 0.65rem; color: var(--text3);
}
.layer-group-chevron {
  width: 16px; height: 16px; fill: var(--text3);
  transition: transform 0.2s; flex-shrink: 0;
}
.layer-group.open .layer-group-chevron { transform: rotate(180deg); }
.layer-group-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
}
.layer-group.open .layer-group-body { max-height: 600px; }
.layer-sub {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 12px 6px 40px;
  font-size: 0.75rem; cursor: pointer;
  transition: background 0.1s;
  user-select: none;
}
.layer-sub:hover { background: rgba(255,255,255,0.03); }
.layer-sub:last-child { padding-bottom: 10px; }
.layer-sub-dot {
  width: 12px; height: 12px; border-radius: 50%;
  flex-shrink: 0; position: relative;
}
.layer-sub-dot::after {
  content: attr(data-symbol);
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 6px; font-weight: 700; color: #fff;
}
.layer-sub-name { flex: 1; color: var(--text2); }
.layer-sub-count { color: var(--text3); font-size: 0.65rem; }
.layer-sub.off .layer-sub-dot { opacity: 0.3; }
.layer-sub.off .layer-sub-name { opacity: 0.4; }

/* Info Panel (bottom of sidebar) */
.sidebar-info {
  padding: 10px 12px;
  border-top: 1px solid var(--border);
  font-size: 0.65rem;
  color: var(--text3);
  line-height: 1.5;
  flex-shrink: 0;
}
.sidebar-info a { color: var(--accent); text-decoration: none; }
.sidebar-info a:hover { text-decoration: underline; }

/* ===== MAP ===== */
.map-wrap {
  flex: 1;
  position: relative;
}
#map {
  width: 100%;
  height: 100%;
  background: var(--bg);
}
/* Dark Leaflet overrides */
.leaflet-control-zoom a {
  background: var(--bg2) !important;
  color: var(--text) !important;
  border-color: var(--border) !important;
}
.leaflet-control-zoom a:hover { background: var(--bg3) !important; }
.leaflet-control-attribution {
  background: rgba(15,15,26,0.85) !important;
  color: var(--text3) !important;
  font-size: 0.6rem !important;
}
.leaflet-control-attribution a { color: var(--text2) !important; }
.leaflet-popup-content-wrapper {
  background: var(--bg2) !important;
  color: var(--text) !important;
  border-radius: var(--radius) !important;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
  border: 1px solid var(--border) !important;
}
.leaflet-popup-tip { background: var(--bg2) !important; }
.leaflet-popup-close-button { color: var(--text3) !important; }
.leaflet-popup-close-button:hover { color: var(--text) !important; }

/* Popup Content */
.popup-title {
  font-size: 0.9rem; font-weight: 600; margin-bottom: 4px;
  display: flex; align-items: center; gap: 6px;
}
.popup-badge {
  display: inline-block;
  padding: 1px 8px;
  border-radius: 4px;
  font-size: 0.6rem;
  font-weight: 600;
  text-transform: uppercase;
}
.popup-row {
  display: flex; gap: 6px; font-size: 0.75rem;
  padding: 2px 0; color: var(--text2);
}
.popup-row-label { color: var(--text3); min-width: 50px; }
.popup-divider {
  border: none; border-top: 1px solid var(--border); margin: 6px 0;
}
.popup-desc {
  font-size: 0.72rem; color: var(--text2);
  line-height: 1.5; margin-top: 4px;
}

/* Custom Tile Layer Control */
.tile-control {
  position: absolute;
  top: 10px;
  right: 10px;
  z-index: 800;
  display: flex;
  gap: 4px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px;
}
.tile-btn {
  background: transparent;
  border: none;
  color: var(--text3);
  font-family: 'Prompt', sans-serif;
  font-size: 0.65rem;
  padding: 5px 10px;
  border-radius: 5px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.tile-btn:hover { color: var(--text); background: rgba(255,255,255,0.05); }
.tile-btn.active { background: var(--accent); color: #000; }

/* Marker Cluster overrides */
.marker-cluster-small, .marker-cluster-medium, .marker-cluster-large {
  background: rgba(79, 195, 247, 0.3) !important;
}
.marker-cluster-small div, .marker-cluster-medium div, .marker-cluster-large div {
  background: rgba(79, 195, 247, 0.7) !important;
  color: #000 !important;
  font-family: 'Prompt', sans-serif !important;
  font-weight: 600 !important;
}

/* ===== MOBILE BOTTOM SHEET ===== */
.mobile-tabs {
  display: none;
  height: 50px;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 900;
}
.mobile-tabs-inner {
  display: flex;
  height: 100%;
}
.mobile-tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  background: none;
  border: none;
  color: var(--text3);
  font-family: 'Prompt', sans-serif;
  font-size: 0.6rem;
  cursor: pointer;
  transition: color 0.15s;
}
.mobile-tab svg { width: 20px; height: 20px; fill: currentColor; }
.mobile-tab.active { color: var(--accent); }

.bottom-sheet {
  display: none;
  position: fixed;
  bottom: 50px;
  left: 0; right: 0;
  max-height: 60vh;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  border-radius: 16px 16px 0 0;
  z-index: 950;
  overflow: hidden;
  flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.bottom-sheet.show {
  display: flex;
  transform: translateY(0);
}
.bottom-sheet-handle {
  width: 40px; height: 4px;
  background: var(--text3);
  border-radius: 2px;
  margin: 8px auto;
  flex-shrink: 0;
}
.bottom-sheet-content {
  flex: 1;
  overflow-y: auto;
  padding: 0 16px 16px;
}

/* ===== LOADING OVERLAY ===== */
.loading {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 9999;
  transition: opacity 0.5s;
}
.loading.hide { opacity: 0; pointer-events: none; }
.loading-spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  margin-top: 16px; color: var(--text2);
  font-size: 0.85rem; font-weight: 300;
}

/* ===== LEGEND (on map) ===== */
.map-legend {
  position: absolute;
  bottom: 30px;
  right: 10px;
  z-index: 800;
  background: rgba(22, 22, 37, 0.92);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  font-size: 0.68rem;
  min-width: 140px;
  max-height: 300px;
  overflow-y: auto;
}
.legend-toggle {
  display: none;
  position: absolute;
  bottom: 60px;
  left: 10px;
  z-index: 800;
  width: 36px; height: 36px;
  border-radius: 8px;
  background: rgba(22, 22, 37, 0.92);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border);
  color: var(--text2);
  font-size: 0.9rem;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
}
.legend-toggle:hover { background: rgba(30,30,50,0.95); color: var(--text); }
.legend-title {
  font-weight: 600; color: var(--text2);
  margin-bottom: 6px; font-size: 0.72rem;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.legend-item {
  display: flex; align-items: center; gap: 6px;
  padding: 2px 0; color: var(--text2);
}
.legend-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.legend-line {
  width: 18px; height: 3px; flex-shrink: 0; border-radius: 1px;
}
.legend-rect {
  width: 14px; height: 10px; flex-shrink: 0; border-radius: 2px;
}
.legend-section { margin-top: 8px; }
.legend-section:first-child { margin-top: 0; }
.legend-section-title {
  font-weight: 600; color: var(--text3);
  font-size: 0.62rem; text-transform: uppercase;
  letter-spacing: 0.5px; margin-bottom: 3px;
}

/* ===== MOBILE SEARCH OVERLAY ===== */
.mobile-search-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 2000;
  background: var(--bg);
  flex-direction: column;
}
.mobile-search-overlay.show { display: flex; }
.mobile-search-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.mobile-search-bar input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  color: var(--text);
  font-family: 'Prompt', sans-serif;
  font-size: 0.85rem;
  outline: none;
}
.mobile-search-bar input:focus { border-color: var(--accent); }
.mobile-search-bar input::placeholder { color: var(--text3); }
.mobile-search-close {
  background: none;
  border: none;
  color: var(--text2);
  font-size: 1.2rem;
  cursor: pointer;
  padding: 8px;
  line-height: 1;
}
.mobile-search-results {
  flex: 1;
  overflow-y: auto;
  padding: 0;
}
.mobile-search-results .search-item {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}
.mobile-search-results .search-item:active {
  background: rgba(255,255,255,0.05);
}
.mobile-search-results .search-item-name { font-size: 0.85rem; }
.mobile-search-results .search-item-sub { font-size: 0.72rem; }
.mobile-search-empty {
  padding: 40px 20px;
  text-align: center;
  color: var(--text3);
  font-size: 0.8rem;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  :root { --topbar-h: 40px; }
  .sidebar { display: none; }
  .menu-btn { display: block; }
  .mobile-tabs { display: block; }
  .map-legend {
    display: none;
    bottom: 60px; left: 10px; right: auto;
    font-size: 0.6rem; padding: 8px 10px;
    max-height: 45vh; min-width: 120px;
  }
  .map-legend.mobile-show { display: block; }
  .legend-toggle { display: flex; }
  .tile-control { top: 6px; right: 6px; }
  .tile-btn { font-size: 0.58rem; padding: 3px 7px; }
  .topbar { padding: 0 10px; }
  .topbar-logo span.full { display: none; }
  .topbar-logo span.short { display: inline !important; }
  .topbar-btn { font-size: 0.68rem; padding: 4px 8px; }
  .leaflet-popup-content-wrapper { max-width: 260px !important; }
  .leaflet-popup-content { margin: 10px !important; font-size: 0.78rem !important; }
  .popup-title { font-size: 0.82rem; }
  .popup-row { font-size: 0.7rem; }
  .popup-desc { font-size: 0.65rem; }
  .mobile-tabs { height: 44px; }
  .mobile-tab { font-size: 0.55rem; }
  .mobile-tab svg { width: 18px; height: 18px; }
  .bottom-sheet { bottom: 44px; max-height: 55vh; }
}
</style>
</head>
<body>

<!-- Loading -->
<div id="loading" class="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text" data-i18n="loading">กำลังโหลดแผนที่ธรณีวิทยา...</div>
</div>

<!-- Top Bar -->
<header class="topbar">
  <button class="menu-btn" onclick="toggleMobileSidebar()" aria-label="Menu">
    <svg viewBox="0 0 24 24"><path d="M3 6h18v2H3V6zm0 5h18v2H3v-2zm0 5h18v2H3v-2z"/></svg>
  </button>
  <div class="topbar-logo">
    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
    <span class="full" data-i18n="appTitle">GeoThai — แผนที่ธรณีวิทยาไทย</span>
    <span class="short" style="display:none" data-i18n="appTitleShort">GeoThai</span>
  </div>
  <div class="topbar-spacer"></div>
  <button class="topbar-btn" id="langBtn" onclick="toggleLang()">EN</button>
  <button class="topbar-btn" id="aboutBtn" onclick="showAbout()">
    <span data-i18n="about">เกี่ยวกับ</span>
  </button>
</header>

<!-- Main -->
<div class="main">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-scroll">
      <!-- Search -->
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input class="search-input" id="searchInput" type="text" data-i18n-placeholder="searchPlaceholder" placeholder="ค้นหาแร่ จังหวัด รอยเลื่อน..." autocomplete="off">
        <div class="search-results" id="searchResults"></div>
      </div>

      <!-- Layers will be built by JS -->
      <div id="layerControls"></div>
    </div>

    <div class="sidebar-info">
      <span data-i18n="dataSource">ข้อมูลจาก:</span> DMR, USGS, MinDat, GEM<br>
      <span data-i18n="disclaimer">แผนที่นี้ใช้เพื่อการศึกษา ไม่ใช่ข้อมูลทางการ</span>
    </div>
  </aside>

  <!-- Map -->
  <div class="map-wrap">
    <div id="map"></div>

    <!-- Tile Layer Control -->
    <div class="tile-control" id="tileControl">
      <button class="tile-btn active" data-tile="dark" onclick="switchTile('dark', this)" data-i18n="tileDark">Dark</button>
      <button class="tile-btn" data-tile="satellite" onclick="switchTile('satellite', this)" data-i18n="tileSat">Satellite</button>
      <button class="tile-btn" data-tile="topo" onclick="switchTile('topo', this)" data-i18n="tileTopo">Topo</button>
    </div>

    <!-- Legend toggle (mobile) -->
    <button class="legend-toggle" id="legendToggle" onclick="toggleLegend()">📋</button>
    <!-- Legend -->
    <div class="map-legend" id="mapLegend"></div>
  </div>
</div>

<!-- Mobile Tabs -->
<div class="mobile-tabs">
  <div class="mobile-tabs-inner">
    <button class="mobile-tab" onclick="openSheet('layers')" id="tabLayers">

      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <span data-i18n="tabSearch">ค้นหา</span>

      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>

<!-- Data files -->
<script src="data/minerals.js"></script>
<script src="data/faults.js"></script>
<script src="data/zones.js"></script>
<script src="data/hazards.js"></script>

<script>
// ===================================================================
// GeoThai — Interactive Geological Map of Thailand
// ===================================================================

const GT = {
  map: null,
  layers: {},
  layerGroups: {},
  clusterGroup: null,
  currentTile: null,
  lang: 'th',
  searchIndex: [],

  // Mineral config
  mineralTypes: {
    tin:       { th: 'ดีบุก',      en: 'Tin',       color: '#7B68EE', symbol: 'Sn' },
    gem:       { th: 'อัญมณี',     en: 'Gems',      color: '#E91E63', symbol: '◆'  },
    potash:    { th: 'โพแทช',      en: 'Potash',    color: '#FF9800', symbol: 'K'  },
    gold:      { th: 'ทองคำ',      en: 'Gold',      color: '#FFD700', symbol: 'Au' },
    zinc:      { th: 'สังกะสี',    en: 'Zinc',      color: '#78909C', symbol: 'Zn' },
    copper:    { th: 'ทองแดง',     en: 'Copper',    color: '#E65100', symbol: 'Cu' },
    gypsum:    { th: 'ยิปซัม',     en: 'Gypsum',    color: '#B0BEC5', symbol: 'Gy' },
    lignite:   { th: 'ลิกไนต์',    en: 'Lignite',   color: '#616161', symbol: 'C'  },
    fluorite:  { th: 'ฟลูออไรต์',  en: 'Fluorite',  color: '#7C4DFF', symbol: 'F'  },
    iron:      { th: 'เหล็ก',      en: 'Iron',      color: '#D32F2F', symbol: 'Fe' },
    limestone: { th: 'หินปูน',     en: 'Limestone',  color: '#BCAAA4', symbol: 'Ca' },
    feldspar:  { th: 'เฟลด์สปาร์', en: 'Feldspar',  color: '#FFB74D', symbol: 'Fs' },
    antimony:  { th: 'พลวง',       en: 'Antimony',  color: '#90A4AE', symbol: 'Sb' },
    lead:      { th: 'ตะกั่ว',     en: 'Lead',      color: '#546E7A', symbol: 'Pb' },
  },

  // Status labels
  statusLabels: {
    active:     { th: 'ยังดำเนินการ', en: 'Active',     color: '#4CAF50' },
    historical: { th: 'ปิดแล้ว',     en: 'Historical', color: '#FF9800' },
    prospect:   { th: 'แหล่งสำรวจ',  en: 'Prospect',   color: '#42A5F5' },
  },

  // i18n
  i18n: {
    th: {
      appTitle: 'GeoThai — แผนที่ธรณีวิทยาไทย',
      appTitleShort: 'GeoThai',
      loading: 'กำลังโหลดแผนที่ธรณีวิทยา...',
      about: 'เกี่ยวกับ',
      searchPlaceholder: 'ค้นหาแร่ จังหวัด รอยเลื่อน...',
      dataSource: 'ข้อมูลจาก:',
      disclaimer: 'แผนที่นี้ใช้เพื่อการศึกษา ไม่ใช่ข้อมูลทางการ',
      tileDark: 'มืด',
      tileSat: 'ดาวเทียม',
      tileTopo: 'ภูมิประเทศ',
      tabLayers: 'ชั้นข้อมูล',
      tabSearch: 'ค้นหา',
      tabInfo: 'ข้อมูล',
      layerMinerals: 'แหล่งแร่',
      layerFaults: 'รอยเลื่อนมีพลัง',
      layerZones: 'เขตธรณีวิทยา',
      layerHazards: 'พื้นที่เสี่ยงภัย',
      province: 'จังหวัด',
      status: 'สถานะ',
      length: 'ความยาว',
      maxMag: 'ขนาดสูงสุด',
      strike: 'ทิศทาง',
      faultType: 'ชนิดรอยเลื่อน',
      riskLevel: 'ระดับความเสี่ยง',
      legendTitle: 'คำอธิบาย',
      legendMinerals: 'แร่ธาตุ',
      legendFaults: 'รอยเลื่อน',
      legendZones: 'เขตธรณี',
      legendHazards: 'พื้นที่เสี่ยงภัย',
      high: 'สูง',
      moderate: 'ปานกลาง',
      low: 'ต่ำ',
      km: 'กม.',
      searchHint: 'พิมพ์อย่างน้อย 2 ตัวอักษรเพื่อค้นหา',
      noResults: 'ไม่พบผลลัพธ์',
    },
    en: {
      appTitle: 'GeoThai — Geological Map of Thailand',
      appTitleShort: 'GeoThai',
      loading: 'Loading geological map...',
      about: 'About',
      searchPlaceholder: 'Search minerals, provinces, faults...',
      dataSource: 'Data from:',
      disclaimer: 'For educational use only, not official data',
      tileDark: 'Dark',
      tileSat: 'Satellite',
      tileTopo: 'Topo',
      tabLayers: 'Layers',
      tabSearch: 'Search',
      tabInfo: 'Info',
      layerMinerals: 'Mineral Deposits',
      layerFaults: 'Active Faults',
      layerZones: 'Geological Zones',
      layerHazards: 'Hazard Zones',
      province: 'Province',
      status: 'Status',
      length: 'Length',
      maxMag: 'Max Magnitude',
      strike: 'Strike',
      faultType: 'Fault Type',
      riskLevel: 'Risk Level',
      legendTitle: 'Legend',
      legendMinerals: 'Minerals',
      legendFaults: 'Faults',
      legendZones: 'Geo. Zones',
      legendHazards: 'Hazard Zones',
      high: 'High',
      moderate: 'Moderate',
      low: 'Low',
      km: 'km',
      searchHint: 'Type at least 2 characters to search',
      noResults: 'No results found',
    }
  },

  // ===== INITIALIZATION =====
  init() {
    this.initMap();
    this.loadAllLayers();
    this.buildSidebar();
    this.buildLegend();
    this.setupSearch();

    // Hide loading
    setTimeout(() => {
      document.getElementById('loading').classList.add('hide');
      setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
    }, 800);
  },

  // ===== MAP SETUP =====
  initMap() {
    this.map = L.map('map', {
      center: [13.0, 101.0],
      zoom: 6,
      minZoom: 5,
      maxZoom: 17,
      preferCanvas: true,
      zoomControl: true,
      attributionControl: true,
    });

    // Tile layers
    this.tiles = {
      dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
        subdomains: 'abcd', maxZoom: 19
      }),
      satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: '&copy; Esri', maxZoom: 18
      }),
      topo: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://opentopomap.org">OpenTopoMap</a>',
        maxZoom: 17
      }),
    };

    this.currentTile = this.tiles.dark;
    this.currentTile.addTo(this.map);
  },

  // ===== LOAD DATA LAYERS =====
  loadAllLayers() {
    const DATA = window.GEOTHAI_DATA || {};

    // --- Geological Zones (render first, behind everything) ---
    if (DATA.zones) {
      this.layers.zones = L.geoJSON(DATA.zones, {
        style: (feature) => ({
          fillColor: feature.properties.color,
          fillOpacity: feature.properties.opacity || 0.12,
          color: feature.properties.color,
          weight: 1.5,
          opacity: 0.4,
          dashArray: '6,4',
        }),
        onEachFeature: (feature, layer) => {
          layer.bindPopup(this.zonePopup(feature.properties));
          this.addToSearchIndex(feature.properties, 'zone', layer);
        }
      });
      this.layers.zones.addTo(this.map);
    }

    // --- Hazard Zones ---
    if (DATA.hazards) {
      this.layers.hazards = L.geoJSON(DATA.hazards, {
        style: (feature) => ({
          fillColor: feature.properties.color,
          fillOpacity: 0.15,
          color: feature.properties.color,
          weight: 1.5,
          opacity: 0.5,
          dashArray: '4,6',
        }),
        onEachFeature: (feature, layer) => {
          layer.bindPopup(this.hazardPopup(feature.properties));
          this.addToSearchIndex(feature.properties, 'hazard', layer);
        }
      });
      // Off by default
    }

    // --- Fault Lines ---
    if (DATA.faults) {
      this.layers.faults = L.geoJSON(DATA.faults, {
        style: (feature) => ({
          color: '#ef5350',
          weight: 2.5,
          opacity: 0.8,
          dashArray: feature.properties.type === 'inferred' ? '8,6' : null,
        }),
        onEachFeature: (feature, layer) => {
          layer.bindPopup(this.faultPopup(feature.properties), { maxWidth: 280 });
          this.addToSearchIndex(feature.properties, 'fault', layer);
        }
      });
      this.layers.faults.addTo(this.map);
    }

    // --- Minerals (clustered) ---
    if (DATA.minerals) {
      this.clusterGroup = L.markerClusterGroup({
        maxClusterRadius: 40,
        spiderfyOnMaxZoom: true,
        showCoverageOnHover: false,
        iconCreateFunction: (cluster) => {
          const count = cluster.getChildCount();
          const size = count < 10 ? 'small' : count < 30 ? 'medium' : 'large';
          return L.divIcon({
            html: `<div><span>${count}</span></div>`,
            className: `marker-cluster marker-cluster-${size}`,
            iconSize: L.point(36, 36)
          });
        }
      });

      // Group by mineral type
      this.mineralLayers = {};
      Object.keys(this.mineralTypes).forEach(key => {
        this.mineralLayers[key] = [];
      });

      DATA.minerals.features.forEach(feature => {
        const p = feature.properties;
        const mType = this.mineralTypes[p.mineral];
        if (!mType) return;

        const marker = L.circleMarker(
          [feature.geometry.coordinates[1], feature.geometry.coordinates[0]],
          {
            radius: 7,
            fillColor: mType.color,
            fillOpacity: 0.85,
            color: '#fff',
            weight: 1.5,
            opacity: 0.6,
          }
        );

        marker.bindTooltip(mType.symbol, {
          permanent: true, direction: 'center',
          className: 'mineral-label',
          offset: [0, 0],
        });

        marker.bindPopup(this.mineralPopup(p), { maxWidth: 280 });

        marker.mineralType = p.mineral;
        this.clusterGroup.addLayer(marker);

        if (this.mineralLayers[p.mineral]) {
          this.mineralLayers[p.mineral].push(marker);
        }

        this.addToSearchIndex(p, 'mineral', marker);
      });

      this.layers.minerals = this.clusterGroup;
      this.clusterGroup.addTo(this.map);
    }

    // Track visible state
    this.layerVisible = {
      minerals: true,
      faults: true,
      zones: true,
      hazards: false,
    };
    this.mineralVisible = {};
    Object.keys(this.mineralTypes).forEach(k => this.mineralVisible[k] = true);
  },

  // ===== POPUP BUILDERS =====
  t(key) { return this.i18n[this.lang][key] || key; },
  p(props, field) { return props[field + '_' + this.lang] || props[field + '_th'] || ''; },

  mineralPopup(p) {
    const mType = this.mineralTypes[p.mineral] || {};
    const status = this.statusLabels[p.status] || {};
    return () => `
      <div class="popup-title">
        <span style="color:${mType.color}">${mType.symbol}</span>
        ${this.p(p, 'name')}
      </div>
      <span class="popup-badge" style="background:${status.color};color:#fff">${status[this.lang]}</span>
      <hr class="popup-divider">
      <div class="popup-row"><span class="popup-row-label">${this.t('province')}</span> ${this.p(p, 'province')}</div>
      <div class="popup-row"><span class="popup-row-label">${mType[this.lang]}</span> ${mType.symbol}</div>
      <p class="popup-desc">${this.p(p, 'description')}</p>
      ${p.source ? `<div style="margin-top:4px;font-size:0.6rem;color:var(--text3)">Source: ${p.source}</div>` : ''}
    `;
  },

  faultPopup(p) {
    return () => `
      <div class="popup-title" style="color:#ef5350">
        ╱╱ ${this.p(p, 'name')}
      </div>
      <hr class="popup-divider">
      <div class="popup-row"><span class="popup-row-label">${this.t('length')}</span> ${p.length_km} ${this.t('km')}</div>
      <div class="popup-row"><span class="popup-row-label">${this.t('strike')}</span> ${p.strike}</div>
      <div class="popup-row"><span class="popup-row-label">${this.t('faultType')}</span> ${this.p(p, 'type')}</div>
      <div class="popup-row"><span class="popup-row-label">${this.t('maxMag')}</span> M${p.max_magnitude}</div>
      <div class="popup-row"><span class="popup-row-label">${this.t('province')}</span> ${(p['provinces_' + this.lang] || p.provinces_th || []).join(', ')}</div>
      <p class="popup-desc">${this.p(p, 'description')}</p>
      ${p.last_event ? `<div style="margin-top:4px;font-size:0.65rem;color:#ef5350">⚠ ${p.last_event}</div>` : ''}
    `;
  },

  zonePopup(p) {
    return () => `
      <div class="popup-title" style="color:${p.color}">
        ${this.p(p, 'name')}
      </div>
      <hr class="popup-divider">
      <div class="popup-row"><span class="popup-row-label">Age</span> ${p.age}</div>
      <div class="popup-row"><span class="popup-row-label">Rocks</span> ${(p.key_rocks || []).join(', ')}</div>
      <div class="popup-row"><span class="popup-row-label">Minerals</span> ${(p.key_minerals || []).join(', ')}</div>
      <p class="popup-desc">${this.p(p, 'description')}</p>
    `;
  },

  hazardPopup(p) {
    const riskLabel = this.t(p.risk_level);
    return () => `
      <div class="popup-title" style="color:${p.color}">
        ⚠ ${this.p(p, 'name')}
      </div>
      <hr class="popup-divider">
      <div class="popup-row"><span class="popup-row-label">${this.t('riskLevel')}</span> <span style="color:${p.color}">${riskLabel}</span></div>
      <div class="popup-row"><span class="popup-row-label">${this.t('province')}</span> ${(p['provinces_' + this.lang] || p.provinces_th || []).join(', ')}</div>
      <p class="popup-desc">${this.p(p, 'description')}</p>
    `;
  },

  // ===== SEARCH INDEX =====
  addToSearchIndex(props, type, layer) {
    this.searchIndex.push({
      name_th: props.name_th || '',
      name_en: props.name_en || '',
      province_th: props.province_th || (props.provinces_th || []).join(' '),
      province_en: props.province_en || (props.provinces_en || []).join(' '),
      mineral: props.mineral || '',
      type: type,
      color: type === 'mineral' ? (this.mineralTypes[props.mineral] || {}).color :
             type === 'fault' ? '#ef5350' :
             props.color || '#4fc3f7',
      layer: layer,
    });
  },

  // ===== SIDEBAR BUILDER =====
  buildSidebar() {
    const container = document.getElementById('layerControls');
    let html = '';

    // Minerals group
    const mineralCount = window.GEOTHAI_DATA?.minerals?.features?.length || 0;
    html += this.buildLayerGroup('minerals', '⛏', 'layerMinerals', mineralCount, true, () => {
      let sub = '';
      Object.entries(this.mineralTypes).forEach(([key, m]) => {
        const count = (this.mineralLayers[key] || []).length;
        if (count === 0) return;
        sub += `
          <div class="layer-sub" data-mineral="${key}" onclick="GT.toggleMineral('${key}', this)">
            <div class="layer-sub-dot" style="background:${m.color}" data-symbol="${m.symbol}"></div>
            <span class="layer-sub-name" data-mineral-name="${key}">${m[this.lang]}</span>
            <span class="layer-sub-count">${count}</span>
          </div>
        `;
      });
      return sub;
    });

    // Faults group
    const faultCount = window.GEOTHAI_DATA?.faults?.features?.length || 0;
    html += this.buildLayerGroup('faults', '╱╱', 'layerFaults', faultCount, true, null);

    // Zones group
    const zoneCount = window.GEOTHAI_DATA?.zones?.features?.length || 0;
    html += this.buildLayerGroup('zones', '◈', 'layerZones', zoneCount, true, null);

    // Hazards group
    const hazardCount = window.GEOTHAI_DATA?.hazards?.features?.length || 0;
    html += this.buildLayerGroup('hazards', '⚠', 'layerHazards', hazardCount, false, null);

    container.innerHTML = html;
  },

  buildLayerGroup(id, icon, labelKey, count, defaultOn, subBuilder) {
    const subs = subBuilder ? subBuilder() : '';
    const hasChildren = subs.length > 0;
    return `
      <div class="layer-group ${hasChildren ? 'open' : ''}" data-layer="${id}">
        <div class="layer-group-header" onclick="GT.toggleLayerGroup('${id}', this)">
          <div class="layer-group-toggle ${defaultOn ? 'on' : ''}" onclick="event.stopPropagation(); GT.toggleLayer('${id}', this)"></div>
          <span class="layer-group-icon">${icon}</span>
          <span class="layer-group-name" data-i18n="${labelKey}">${this.t(labelKey)}</span>
          <span class="layer-group-count">${count}</span>
          ${hasChildren ? '<svg class="layer-group-chevron" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z" fill="currentColor"/></svg>' : ''}
        </div>
        ${hasChildren ? `<div class="layer-group-body">${subs}</div>` : ''}
      </div>
    `;
  },

  // ===== LAYER TOGGLES =====
  toggleLayer(id, el) {
    const isOn = el.classList.toggle('on');
    this.layerVisible[id] = isOn;

    if (isOn) {
      if (this.layers[id]) this.layers[id].addTo(this.map);
    } else {
      if (this.layers[id]) this.map.removeLayer(this.layers[id]);
    }
    this.buildLegend();
  },

  toggleLayerGroup(id, headerEl) {
    const group = headerEl.closest('.layer-group');
    group.classList.toggle('open');
  },

  toggleMineral(mineralKey, el) {
    const isOff = el.classList.toggle('off');
    this.mineralVisible[mineralKey] = !isOff;
    this.refreshMineralLayer();
  },

  refreshMineralLayer() {
    if (!this.clusterGroup) return;
    this.clusterGroup.clearLayers();
    Object.entries(this.mineralLayers).forEach(([key, markers]) => {
      if (this.mineralVisible[key]) {
        markers.forEach(m => this.clusterGroup.addLayer(m));
      }
    });
  },

  // ===== LEGEND =====
  buildLegend() {
    const legend = document.getElementById('mapLegend');
    let html = `<div class="legend-title">${this.t('legendTitle')}</div>`;

    // Minerals
    if (this.layerVisible.minerals) {
      html += `<div class="legend-section"><div class="legend-section-title">${this.t('legendMinerals')}</div>`;
      Object.entries(this.mineralTypes).forEach(([key, m]) => {
        if ((this.mineralLayers[key] || []).length === 0) return;
        if (!this.mineralVisible[key]) return;
        html += `<div class="legend-item"><div class="legend-dot" style="background:${m.color}"></div>${m[this.lang]}</div>`;
      });
      html += '</div>';
    }

    // Faults
    if (this.layerVisible.faults) {
      html += `<div class="legend-section"><div class="legend-section-title">${this.t('legendFaults')}</div>`;
      html += `<div class="legend-item"><div class="legend-line" style="background:#ef5350"></div>${this.t('layerFaults')}</div>`;
      html += '</div>';
    }

    // Zones
    if (this.layerVisible.zones && window.GEOTHAI_DATA?.zones) {
      html += `<div class="legend-section"><div class="legend-section-title">${this.t('legendZones')}</div>`;
      window.GEOTHAI_DATA.zones.features.forEach(f => {
        const p = f.properties;
        html += `<div class="legend-item"><div class="legend-rect" style="background:${p.color};opacity:0.5"></div>${this.p(p, 'name')}</div>`;
      });
      html += '</div>';
    }

    // Hazards
    if (this.layerVisible.hazards && window.GEOTHAI_DATA?.hazards) {
      html += `<div class="legend-section"><div class="legend-section-title">${this.t('legendHazards')}</div>`;
      window.GEOTHAI_DATA.hazards.features.forEach(f => {
        const p = f.properties;
        html += `<div class="legend-item"><div class="legend-rect" style="background:${p.color};opacity:0.5"></div>${this.p(p, 'name')}</div>`;
      });
      html += '</div>';
    }

    legend.innerHTML = html;
  },

  // ===== SEARCH =====
  setupSearch() {
    const input = document.getElementById('searchInput');
    const results = document.getElementById('searchResults');

    input.addEventListener('input', () => {
      const q = input.value.trim().toLowerCase();
      if (q.length < 2) { results.classList.remove('show'); return; }

      const matches = this.searchIndex.filter(item => {
        return item.name_th.toLowerCase().includes(q) ||
               item.name_en.toLowerCase().includes(q) ||
               item.province_th.toLowerCase().includes(q) ||
               item.province_en.toLowerCase().includes(q) ||
               item.mineral.toLowerCase().includes(q);
      }).slice(0, 15);

      if (matches.length === 0) { results.classList.remove('show'); return; }

      results.innerHTML = matches.map((m, i) => `
        <div class="search-item" onclick="GT.goToResult(${i})" data-idx="${i}">
          <div class="search-item-dot" style="background:${m.color}"></div>
          <div class="search-item-text">
            <div class="search-item-name">${GT.lang === 'th' ? m.name_th : m.name_en}</div>
            <div class="search-item-sub">${m.type} · ${GT.lang === 'th' ? m.province_th : m.province_en}</div>
          </div>
        </div>
      `).join('');

      results._matches = matches;
      results.classList.add('show');
    });

    input.addEventListener('blur', () => {
      setTimeout(() => results.classList.remove('show'), 200);
    });
  },

  goToResult(idx) {
    const results = document.getElementById('searchResults');
    const match = results._matches?.[idx];
    if (!match || !match.layer) return;

    results.classList.remove('show');

    if (match.layer.getLatLng) {
      this.map.flyTo(match.layer.getLatLng(), 10, { duration: 0.8 });
      setTimeout(() => match.layer.openPopup(), 900);
    } else if (match.layer.getBounds) {
      this.map.flyToBounds(match.layer.getBounds(), { padding: [50, 50], duration: 0.8 });
      setTimeout(() => match.layer.openPopup(), 900);
    }

    // Close mobile sheet
    closeSheet();
  },
};

// ===== GLOBAL FUNCTIONS =====

function switchTile(name, btn) {
  if (GT.currentTile) GT.map.removeLayer(GT.currentTile);
  GT.currentTile = GT.tiles[name];
  GT.currentTile.addTo(GT.map);
  document.querySelectorAll('.tile-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function toggleLang() {
  GT.lang = GT.lang === 'th' ? 'en' : 'th';
  document.getElementById('langBtn').textContent = GT.lang === 'th' ? 'EN' : 'TH';

  // Update all i18n elements
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (GT.i18n[GT.lang][key]) el.textContent = GT.i18n[GT.lang][key];
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const key = el.getAttribute('data-i18n-placeholder');
    if (GT.i18n[GT.lang][key]) el.placeholder = GT.i18n[GT.lang][key];
  });

  // Update mineral sub-names
  document.querySelectorAll('[data-mineral-name]').forEach(el => {
    const key = el.getAttribute('data-mineral-name');
    if (GT.mineralTypes[key]) el.textContent = GT.mineralTypes[key][GT.lang];
  });

  // Rebuild legend
  GT.buildLegend();

  // Close any open popups and re-open so they refresh
  GT.map.closePopup();
}

// Mobile functions
function toggleMobileSidebar() {
  const sheet = document.getElementById('bottomSheet');
  const content = document.getElementById('bottomSheetContent');

  if (sheet.classList.contains('show')) {
    closeSheet();
    return;
  }

  content.innerHTML = document.querySelector('.sidebar-scroll').innerHTML;
  // Re-wire event handlers in cloned content
  content.querySelectorAll('.layer-group-toggle').forEach(el => {
    const layerId = el.closest('.layer-group').getAttribute('data-layer');
    el.onclick = (e) => { e.stopPropagation(); GT.toggleLayer(layerId, el); };
  });
  content.querySelectorAll('.layer-group-header').forEach(el => {
    const layerId = el.closest('.layer-group').getAttribute('data-layer');
    el.onclick = () => GT.toggleLayerGroup(layerId, el);
  });
  content.querySelectorAll('.layer-sub').forEach(el => {
    const mineralKey = el.getAttribute('data-mineral');
    if (mineralKey) el.onclick = () => GT.toggleMineral(mineralKey, el);
  });

  sheet.classList.add('show');
}

function openSheet(tab) {
  const sheet = document.getElementById('bottomSheet');
  const content = document.getElementById('bottomSheetContent');

  document.querySelectorAll('.mobile-tab').forEach(t => t.classList.remove('active'));

  if (tab === 'layers') {
    document.getElementById('tabLayers').classList.add('active');
    toggleMobileSidebar();
    return;
  }

  if (tab === 'search') {
    openMobileSearch();
    return;
  }

  if (tab === 'info') {
    document.getElementById('tabInfo').classList.add('active');
    const l = GT.lang;
    content.innerHTML = `
      <div style="padding:8px 0;">
        <div style="font-weight:600;font-size:0.9rem;margin-bottom:8px;color:var(--accent)">GeoThai v1.0</div>
        <p style="font-size:0.75rem;color:var(--text2);line-height:1.6;margin-bottom:12px">
          ${l === 'th' ? 'แผนที่ธรณีวิทยาเชิงโต้ตอบของประเทศไทย' : 'Interactive geological map of Thailand'}
        </p>
        <div style="font-size:0.7rem;color:var(--text3);line-height:1.6">
          <b>${l === 'th' ? 'แหล่งข้อมูล' : 'Sources'}:</b><br>
          • DMR (กรมทรัพยากรธรณี)<br>
          • USGS Open-File Report 84-403<br>
          • GEM Global Active Faults<br>
          • MinDat.org<br><br>
          <b>${l === 'th' ? 'หมายเหตุ' : 'Note'}:</b>
          ${l === 'th' ? 'ข้อมูลเพื่อการศึกษา ตำแหน่งเป็นค่าประมาณระดับอำเภอ' : 'For educational use. Coordinates are approximate.'}
        </div>
      </div>
    `;
    sheet.classList.add('show');
  }
}

function openMobileSearch() {
  const overlay = document.getElementById('mobileSearchOverlay');
  const input = document.getElementById('mobileSearchInput2');
  const resultsDiv = document.getElementById('mobileSearchResults2');
  const hint = document.getElementById('mobileSearchHint');

  overlay.classList.add('show');
  closeSheet();
  setTimeout(() => input.focus(), 200);

  // Remove old listener to avoid duplicates
  const newInput = input.cloneNode(true);
  input.parentNode.replaceChild(newInput, input);

  newInput.addEventListener('input', () => {
    const q = newInput.value.trim().toLowerCase();
    if (q.length < 2) {
      resultsDiv.innerHTML = `<div class="mobile-search-empty">${GT.lang === 'th' ? 'พิมพ์อย่างน้อย 2 ตัวอักษรเพื่อค้นหา' : 'Type at least 2 characters to search'}</div>`;
      return;
    }

    const matches = GT.searchIndex.filter(item =>
      item.name_th.toLowerCase().includes(q) ||
      item.name_en.toLowerCase().includes(q) ||
      item.province_th.toLowerCase().includes(q) ||
      item.province_en.toLowerCase().includes(q) ||
      item.mineral.toLowerCase().includes(q)
    ).slice(0, 30);

    if (matches.length === 0) {
      resultsDiv.innerHTML = `<div class="mobile-search-empty">${GT.lang === 'th' ? 'ไม่พบผลลัพธ์' : 'No results found'}</div>`;
      return;
    }

    resultsDiv.innerHTML = matches.map((m, i) => `
      <div class="search-item" onclick="mobileGoToResult2(${i})" data-idx="${i}">
        <div class="search-item-dot" style="background:${m.color}"></div>
        <div class="search-item-text">
          <div class="search-item-name">${GT.lang === 'th' ? m.name_th : m.name_en}</div>
          <div class="search-item-sub">${m.type} · ${GT.lang === 'th' ? m.province_th : m.province_en}</div>
        </div>
      </div>
    `).join('');
    resultsDiv._matches = matches;
  });
}

function closeMobileSearch() {
  document.getElementById('mobileSearchOverlay').classList.remove('show');
  document.querySelectorAll('.mobile-tab').forEach(t => t.classList.remove('active'));
}

function mobileGoToResult2(idx) {
  const resultsDiv = document.getElementById('mobileSearchResults2');
  const match = resultsDiv._matches?.[idx];
  if (!match || !match.layer) return;
  closeMobileSearch();
  if (match.layer.getLatLng) {
    GT.map.flyTo(match.layer.getLatLng(), 10, { duration: 0.8 });
    setTimeout(() => match.layer.openPopup(), 900);
  } else if (match.layer.getBounds) {
    GT.map.flyToBounds(match.layer.getBounds(), { padding: [50, 50], duration: 0.8 });
    setTimeout(() => match.layer.openPopup(), 900);
  }
}

// Keep legacy for desktop sidebar search
function mobileGoToResult(idx) {
  const results = document.getElementById('mobileSearchResults');
  const match = results._matches?.[idx];
  if (!match || !match.layer) return;
  closeSheet();
  if (match.layer.getLatLng) {
    GT.map.flyTo(match.layer.getLatLng(), 10, { duration: 0.8 });
    setTimeout(() => match.layer.openPopup(), 900);
  } else if (match.layer.getBounds) {
    GT.map.flyToBounds(match.layer.getBounds(), { padding: [50, 50], duration: 0.8 });
    setTimeout(() => match.layer.openPopup(), 900);
  }
}

function closeSheet() {
  document.getElementById('bottomSheet').classList.remove('show');
  document.querySelectorAll('.mobile-tab').forEach(t => t.classList.remove('active'));
}

function toggleLegend() {
  const legend = document.getElementById('mapLegend');
  legend.classList.toggle('mobile-show');
}

// Close legend when tapping on map (mobile)
document.addEventListener('click', (e) => {
  const legend = document.getElementById('mapLegend');
  const toggle = document.getElementById('legendToggle');
  if (legend.classList.contains('mobile-show') &&
      !legend.contains(e.target) && !toggle.contains(e.target)) {
    legend.classList.remove('mobile-show');
  }
});
